<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAROMBE Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f7f7f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .studio-container {
      width: 960px;
      max-width: 100vw;
      height: 650px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.05);
      display: flex;
      border: 1px solid #e5e5e5;
      position: relative;
    }
    /* LEFT PANEL */
    .left-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e5e5e5;
    }
    .studio-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      background: #fff;
    }
    .lion-logo-img {
      width: 28px;
      height: 28px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid goldenrod;
      box-shadow: 0 0 8px rgba(255,215,0,0.7);
    }
    .brand-name {
      font-weight: 600;
      font-size: 1rem;
      color: #141414;
    }
    .tabs {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }
    .tab {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      outline: none;
      background: transparent;
      color: #666;
    }
    .tab.active { background: #141414; color: #fff; }
    .tab:hover:not(.active) { background: #f0f0f0; }
    .gear-btn {
      margin-left: 4px;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #666;
      padding: 4px 6px;
      border-radius: 50%;
    }
    .gear-btn:hover { background: #f0f0f0; }

    .chat-box {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message { display: flex; flex-direction: column; max-width: 85%; }
    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }
    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
      background: #fff;
    }
    .message.user .bubble { background: #eaeaea; color: #141414; border-bottom-right-radius: 4px; }
    .message.assistant .bubble { background: #fff; color: #141414; border: 1px solid #eaeaea; border-bottom-left-radius: 4px; }
    .sender { font-size: 0.7rem; font-weight: 500; color: #888; margin-bottom: 4px; padding-left: 6px; }
    .copy-code-btn {
      margin-top: 4px;
      font-size: 0.7rem;
      background: #141414;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 2px 8px;
      cursor: pointer;
    }
    .copy-code-btn:hover { background: #333; }
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
    }
    .input-area input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 24px;
      font-size: 0.9rem;
      background: #f7f7f8;
      outline: none;
    }
    .input-area input:focus { border-color: #c0c0c0; background: #fff; }
    .input-area button {
      padding: 10px 20px;
      background: #141414;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-weight: 500;
      cursor: pointer;
    }
    .input-area button:hover { background: #333; }

    /* RIGHT PANEL (preview) */
    .right-panel {
      width: 50%;
      display: none;
      flex-direction: column;
    }
    .right-panel.visible { display: flex; }
    .preview-header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      font-weight: 600;
      background: #fafafa;
    }
    .preview-frame {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    /* SETTINGS PANEL (slide from right) */
    .settings-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: #fff;
      box-shadow: -5px 0 15px rgba(0,0,0,0.1);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 20;
      padding: 16px;
      border-left: 1px solid #e5e5e5;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .settings-panel.open { transform: translateX(0); }
    .settings-close {
      align-self: flex-end;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #666;
    }
    .settings-title { font-weight: 600; font-size: 1.1rem; margin-bottom: 4px; }
    .setting-group { display: flex; flex-direction: column; gap: 6px; }
    .setting-group label { font-size: 0.8rem; color: #555; }
    .setting-group input, .setting-group textarea, .setting-group select {
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .setting-row { display: flex; align-items: center; gap: 8px; }
    .setting-row span { font-size: 0.8rem; min-width: 40px; text-align: center; }

    .chat-box::-webkit-scrollbar { width: 6px; }
    .chat-box::-webkit-scrollbar-track { background: transparent; }
    .chat-box::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="studio-container" id="studioContainer">
    <!-- LEFT PANEL -->
    <div class="left-panel" id="leftPanel">
      <div class="studio-header">
        <img class="lion-logo-img" src="https://copilot.microsoft.com/th/id/BCO.6d81f28e-8a1a-46f8-8321-0f044c26f3f4.png" alt="Lion">
        <span class="brand-name">KAROMBE Studio</span>
        <div class="tabs">
          <button class="tab active" data-mode="chat">Chat</button>
          <button class="tab" data-mode="code">Code</button>
          <button class="tab" data-mode="json">JSON</button>
        </div>
        <button class="gear-btn" id="openSettings" title="Settings">⚙️</button>
      </div>
      <div class="chat-box" id="chatBox"></div>
      <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything..." autofocus>
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>

    <!-- RIGHT PANEL: preview -->
    <div class="right-panel" id="rightPanel">
      <div class="preview-header">Live Preview</div>
      <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts"></iframe>
    </div>

    <!-- SETTINGS PANEL (hidden) -->
    <div class="settings-panel" id="settingsPanel">
      <button class="settings-close" id="closeSettings">&times;</button>
      <div class="settings-title">Studio Settings</div>
      <div class="setting-group">
        <label for="systemPrompt">System Instructions</label>
        <textarea id="systemPrompt" rows="4" placeholder="You are a helpful assistant..."></textarea>
      </div>
      <div class="setting-group">
        <label>Temperature</label>
        <div class="setting-row">
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="1">
          <span id="tempValue">1.0</span>
        </div>
      </div>
      <div class="setting-group">
        <label for="maxTokens">Max Output Tokens</label>
        <input type="number" id="maxTokens" value="1024" min="1" max="4096" step="1">
      </div>
      <div class="setting-group">
        <label for="jsonMode">Response Format (for JSON mode)</label>
        <select id="jsonMode">
          <option value="none">None</option>
          <option value="json_object">JSON Object</option>
        </select>
      </div>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const rightPanel = document.getElementById('rightPanel');
    const previewFrame = document.getElementById('previewFrame');
    const settingsPanel = document.getElementById('settingsPanel');
    const openSettingsBtn = document.getElementById('openSettings');
    const closeSettingsBtn = document.getElementById('closeSettings');
    const systemPromptInput = document.getElementById('systemPrompt');
    const temperatureInput = document.getElementById('temperature');
    const tempValueSpan = document.getElementById('tempValue');
    const maxTokensInput = document.getElementById('maxTokens');
    const jsonModeSelect = document.getElementById('jsonMode');
    const tabs = document.querySelectorAll('.tab');

    let activeMode = 'chat';
    let lastGeneratedCode = '';

    // Settings synchronization
    temperatureInput.addEventListener('input', () => {
      tempValueSpan.textContent = parseFloat(temperatureInput.value).toFixed(1);
    });

    openSettingsBtn.addEventListener('click', () => {
      settingsPanel.classList.add('open');
    });
    closeSettingsBtn.addEventListener('click', () => {
      settingsPanel.classList.remove('open');
    });

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeMode = tab.dataset.mode;
        if (activeMode === 'code') {
          rightPanel.classList.add('visible');
          userInput.placeholder = 'Describe the website you want...';
          if (lastGeneratedCode) updatePreview(lastGeneratedCode);
        } else {
          rightPanel.classList.remove('visible');
          if (activeMode === 'chat') userInput.placeholder = 'Ask anything...';
          else if (activeMode === 'json') userInput.placeholder = 'Enter a query for structured data...';
        }
        // Automatically set response_format based on JSON tab
        if (activeMode === 'json') {
          jsonModeSelect.value = 'json_object';
        } else {
          jsonModeSelect.value = 'none';
        }
      });
    });

    function appendMessage(role, content, extraAction = null) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const sender = role === 'user' ? 'You' : 'KAROMBE';
      let html = `<span class="sender">${sender}</span><div class="bubble">${content}</div>`;
      if (extraAction && role === 'assistant') {
        html += extraAction;
      }
      div.innerHTML = html;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function extractCodeBlock(text) {
      const regex = /```(?:html)?\s*([\s\S]*?)```/;
      const match = text.match(regex);
      return match ? match[1].trim() : null;
    }

    function updatePreview(code) {
      previewFrame.srcdoc = code;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage('user', message);
      userInput.value = '';

      // Build the request payload
      let messages = [{ role: 'user', content: message }];
      const systemMsg = systemPromptInput.value.trim();
      const temperature = parseFloat(temperatureInput.value);
      const maxTokens = parseInt(maxTokensInput.value, 10);
      let responseFormat = null;

      if (activeMode === 'json' || jsonModeSelect.value === 'json_object') {
        responseFormat = { type: 'json_object' };
      }

      const payload = {
        messages,
        systemMessage: systemMsg.length > 0 ? systemMsg : undefined,
        temperature: !isNaN(temperature) ? temperature : undefined,
        max_tokens: !isNaN(maxTokens) && maxTokens > 0 ? maxTokens : undefined,
        response_format: responseFormat
      };

      // Clean undefined fields
      Object.keys(payload).forEach(key => payload[key] === undefined && delete payload[key]);

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (data.error) {
          appendMessage('assistant', '⚠️ ' + data.error);
        } else if (data.reply) {
          let replyContent = data.reply;
          let copyButton = '';

          // If in Code mode, try to extract code and show copy button
          if (activeMode === 'code') {
            const code = extractCodeBlock(replyContent);
            if (code) {
              lastGeneratedCode = code;
              updatePreview(code);
              copyButton = `<button class="copy-code-btn" onclick="navigator.clipboard.writeText(\`${code.replace(/`/g, '\`')}\`)">Copy code</button>`;
            } else {
              // fallback: use whole reply as code
              lastGeneratedCode = replyContent;
              updatePreview(replyContent);
              copyButton = `<button class="copy-code-btn" onclick="navigator.clipboard.writeText(\`${replyContent.replace(/`/g, '\`')}\`)">Copy code</button>`;
            }
          } else if (activeMode === 'json') {
            // Try to pretty-print JSON
            try {
              const jsonObj = JSON.parse(replyContent);
              replyContent = JSON.stringify(jsonObj, null, 2);
            } catch (e) {}
          }

          appendMessage('assistant', replyContent, copyButton ? copyButton : null);
        } else {
          appendMessage('assistant', '⚠️ Unexpected response');
        }
      } catch (err) {
        appendMessage('assistant', '⚠️ ' + err.message);
      }
    }

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
